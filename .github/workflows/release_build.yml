name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags starting with 'v', e.g., v1.0.0

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build Executable
        run: |
          pyinstaller --onefile --clean --name dicomtag dicomtag/main.py
          mkdir -p dist/linux
          mv dist/dicomtag dist/linux/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: dist/linux/

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build Executable
        shell: bash
        run: |
          pyinstaller --onefile --clean --name dicomtag dicomtag/main.py
          mkdir -p dist/windows
          mv dist/dicomtag.exe dist/windows/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/windows/

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-executable
          path: ./dist/linux

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: ./dist/windows

      - name: Rename binaries with platform suffix
        run: |
          mv ./dist/linux/dicomtag ./dist/linux/dicomtag-linux
          mv ./dist/windows/dicomtag.exe ./dist/windows/dicomtag-windows.exe

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./dist/linux/dicomtag-linux
            ./dist/windows/dicomtag-windows.exe
